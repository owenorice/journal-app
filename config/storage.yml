test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Auth via the App Service system-assigned managed identity (no principal_id needed);
# token fetch is lazy, so boot/precompile without Azure network access still works.
azure:
  service: AzureBlob
  storage_account_name: <%= ENV["AZURE_STORAGE_ACCOUNT_NAME"] %>
  container: <%= ENV["AZURE_STORAGE_CONTAINER"] %>
  use_managed_identities: true
