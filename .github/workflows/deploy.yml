name: Deploy Rails App to Azure

on:
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Terraform
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Docker Image
        run: |
          az acr login --name acrjournalapp
          docker build --platform linux/amd64 -t acrjournalapp.azurecr.io/journal_app:latest .
          docker push acrjournalapp.azurecr.io/journal_app:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="rails_master_key=${{ secrets.RAILS_MASTER_KEY }}"
